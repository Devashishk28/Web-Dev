<!DOCTYPE html>
<html>
<head>
  <title>Email Sender Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="CLASS">
  <h2>Email Sender Pro 📧</h2>

  <textarea id="emailInput" rows="6" cols="40"
    placeholder="Enter emails (one per line)"></textarea>

  <br><br>

  <button onclick="startSending()">Send Emails</button>

  <h3 id="progress">Progress: 0/0</h3>

  <ul id="resultList"></ul>

  <button id="retryBtn" onclick="retryFailed()" style="display:none;">
    Retry Failed ❌
  </button>
</div>
  <script src="script.js"></script>
</body>
</html>
